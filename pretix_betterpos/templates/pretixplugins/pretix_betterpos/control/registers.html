{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% trans "BetterPOS Registers" %}</title>
</head>
<body>
    <h1>{% trans "POS Registers" %}</h1>
    <table>
        <thead>
            <tr>
                <th>{% trans "Code" %}</th>
                <th>{% trans "Name" %}</th>
                <th>{% trans "Active" %}</th>
            </tr>
        </thead>
        <tbody>
            {% for register in registers %}
                <tr>
                    <td>{{ register.code }}</td>
                    <td>{{ register.name }}</td>
                    <td>{{ register.is_active }}</td>
                </tr>
            {% empty %}
                <tr><td colspan="3">{% trans "No registers yet" %}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
